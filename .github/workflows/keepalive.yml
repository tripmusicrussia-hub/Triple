name: Keepalive Render (prevent sleep before daily scheduler)

on:
  schedule:
    # Круглосуточно каждые 10 минут. GitHub Actions на public-репо даёт
    # unlimited runtime, лимит минут не упираемся. Почему 24/7 а не только
    # окно 16:00 МСК: (1) upload битов может происходить в любое время,
    # (2) юзер может жать "Опубликовать" на старых превью поздно вечером,
    # (3) публикации продуктов и их промо тоже требуют живого бота.
    - cron: '*/10 * * * *'
  workflow_dispatch:  # ручной запуск из UI для тестов

concurrency:
  group: keepalive-triple
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Render health endpoint
        run: |
          URL="https://triple-dnke.onrender.com/"
          for i in 1 2 3; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -m 45 "$URL") || HTTP_CODE="000"
            echo "Attempt $i → HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Bot awake"
              exit 0
            fi
            sleep 5
          done
          echo "⚠️ Bot unreachable after 3 attempts (may be waking up — not failing job)"
